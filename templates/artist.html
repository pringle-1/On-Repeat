<!-- Extend the layout.html file onto the specific artist's page -->
{% extends "layout.html" %}
<!-- Set the page title that displays on the tab -->
{% block title%}On Repeat - {{ artist['artist_name'] }}{% endblock %}
<!-- One album page main content block -->
{% block content %}
<!-- Data display -->
    <h1>{{ artist['artist_name'] }}</h1>
    <p> Founding Year: {{ artist['formation_year'] }}</p>
    <p> About Artist: {{ artist['artist_bio'] }}</p>
{% endblock %}
