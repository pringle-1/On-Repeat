<!-- Extend the layout.html file onto the albums page -->
{% extends "layout.html" %}
<!-- Set the page title that displays on the tab -->
{% block title%}On Repeat - Albums{% endblock %}
<!-- Albums page main content block -->
{% block content %}
<!-- Data display -->
<div class="album-page-header-container">
    <h1 class="album-page-header">Albums</h1>
</div>
<div class="albums-container">
        {% for album in albums %}
            <a href="{{ url_for('album',id=album['album_id']) }}">
                <!-- Album name then album cover -->
                <div class="albums-card">
                    <h1 class="albums-header">{{ album['album_title'] }}</h1>
                    <img src="{{ url_for('static', filename='images/' + album['album_cover'])}}" alt="{{ album['album_title'] }}">
                </div>
            </a>
        {% endfor %}
</div>
{% endblock %}
