<!-- Extend the layout.html file onto the home page -->
{% extends "layout.html" %}
<!-- Set the page title that displays on the tab -->
{% block title%}On Repeat - Home{% endblock %}
<!-- Home page main content block -->

{% block content %}
{% if current_user %}
    <h1>Welcome, {{ current_user['username'] }}!</h1>
{% else %}
    <h1>Welcome to On Repeat, Guest!</h1>
{% endif %}
{% endblock %}
